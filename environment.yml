name: ecr
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pandas
  - requests
  - pyyaml
  - tqdm
  - openpyxl
  - biopython
  - paramiko
  - pyotp         # TOTP code generation for HPCC TOTP-based authentication
  - meme          # MEME Suite — provides the fimo binary for eCR_predictor
  - freesasa      # per-residue solvent accessibility for the fusion Gate-2 aggregation scorer
