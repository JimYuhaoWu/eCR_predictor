# ECR_predictor configuration
# Pass to refine.py with: --config config.yaml

af3:
  # Which backend to use: local | hpcc | online
  backend: hpcc

  # ── Local backend ──────────────────────────────────────────────────────────
  # Use this when running refine.py directly on the HPCC (or any machine
  # where AF3 is installed). Set backend: local in config.yaml, then run
  # refine.py interactively on the HPCC.
  local:
    af3_script: run_alphafold3.sh   # name or full path to run_alphafold3.sh
    module_load: alphafold/3_a40-tmp  # module to load before running (leave blank if not needed)

  # ── HPCC backend (Slurm via SSH) ───────────────────────────────────────────
  # Two authentication types:
  #
  # 1. STATIC PASSWORD (auth_method: password)
  #    Set ssh_password here, or use ECR_HPCC_PASSWORD env var.
  #    Example: export ECR_HPCC_PASSWORD='yourpassword'
  #
  # 2. TOTP (auth_method: totp)
  #    For TOTP-protected accounts, provide the shared secret.
  #    The script generates TOTP codes on-the-fly.
  #    Set totp_secret here, or use ECR_HPCC_TOTP_SECRET env var.
  #    Example: export ECR_HPCC_TOTP_SECRET='JBSWY3DPEBLW64TMMQ======'
  #
  # Avoid committing real credentials to config.yaml (it's gitignored).
  hpcc:
    host: hpcc.example.edu          # HPCC head node hostname or IP
    port: 22                        # SSH port (use 10004 if needed)
    user: your_username             # SSH username

    # Choose one: password | totp
    auth_method: password

    # For password-based auth (static password)
    ssh_password: ""                # or set ECR_HPCC_PASSWORD env var

    # For TOTP-based auth (time-based one-time passwords)
    totp_secret: ""                 # or set ECR_HPCC_TOTP_SECRET env var

    remote_workdir: /scratch/your_username/ecr_af3_jobs  # writable dir on HPCC

    # Slurm settings (match your cluster's available partitions/QOS)
    slurm_partition: a40-tmp
    slurm_qos: gpu
    slurm_nodes: 1
    slurm_cpus: 8
    slurm_gpus: 1
    slurm_mem: 80G
    slurm_module: alphafold/3_a40-tmp  # module load <this>

    # How long to wait between squeue polls (seconds)
    poll_interval: 60
    # Give up after this many seconds (0 = wait forever)
    timeout: 7200

  # ── Online backend (Chai-1 API) ───────────────────────────────────────────
  # Chai-1 is an AF3-class model that supports protein–DNA complexes.
  # Sign up at https://chaidiscovery.com to get an API key, then set:
  #   export ECR_CHAI_API_KEY='your_key'
  # Or paste the key below (do not commit config.yaml with a real key).
  online:
    api_key: ""   # Chai-1 API key (prefer env var ECR_CHAI_API_KEY)


# ─────────────────────────────────────────────────────────────────────────────
# Fusion-design stage (Step 3 — fuse.py)
# ─────────────────────────────────────────────────────────────────────────────
# Assembles DBD + linker + ED candidates and screens them for developability
# liabilities before wet-lab synthesis. Target modality: INTRACELLULAR expression
# (viral vector / mRNA), so MHC-I junction neoepitopes are the primary concern.
#
# Each external tool is invoked through a local-CLI-or-API backend, exactly like
# the AF3 stage. Per tool:  backend: local | api | disabled
fusion:
  # Domain order in the fusion: dbd_n (DBD at N-terminus) | ed_n
  orientation: dbd_n

  # Linker library to enumerate (every linker is tried against every DBD×ED).
  linkers:
    - name: GS-flex
      sequence: GGGGSGGGGS        # flexible; Gly/Ser poorly presented by MHC-I
    - name: EAAAK-rigid
      sequence: EAAAKEAAAK        # rigid α-helical; charged
    - name: XTEN16
      sequence: SGSETPGTSESATPES  # unstructured, low-immunogenicity scaffold

  # Effector domains (EDs) are read from the eCR_mod_lib library (type='ED'),
  # NOT from this file. Subset them at the CLI with: fuse.py --ed VP64,KRAB

  # Self-proteome FASTA for Gate-1 self-tolerance (strongly recommended): junction
  # peptides occurring verbatim in self are dropped before the MHC-I scan.
  # Resolution priority: self_proteome (explicit path, below) > fuse.py --species >
  # species auto-detected from the --dbd-input 'species' column. The species form
  # resolves to <proteome_dir>/<slug>.fasta (e.g. "Homo sapiens" -> homo_sapiens.fasta),
  # so you pick the organism per run without editing this file.
  self_proteome: ""               # explicit override; leave empty to use species resolution
  proteome_dir: data/proteomes    # where <species-slug>.fasta files live (repo-relative)

  # Residues either side of a boundary still counted as "at the junction" (Gate 2).
  junction_window: 5

  tools:
    # ── Gate 1: MHC-I junction neoepitope screen ─────────────────────────────
    # Enable ONE MHC-I tool. NetMHCpan 4.2 is the default (binding by %rank).
    # NetCTLpan 1.1 (proteasomal cleavage + TAP + MHC-I) was DISCONTINUED by DTU
    # and superseded by NetMHCpan — keep it disabled unless a legacy install needs it.
    netctlpan:
      backend: disabled           # local | api | disabled (DEPRECATED tool)
      local:
        command: netCTLpan
        extra_args: ""
        timeout: 600
      api:
        url: ""
        api_key_env: ECR_NETCTLPAN_API_KEY
        poll_interval: 10
        timeout: 600
      alleles: [HLA-A02:01, HLA-A01:01, HLA-A03:01, HLA-B07:02, HLA-B08:01]
      peptide_lengths: [8, 9, 10, 11]
      rank_threshold: 2.0         # %rank ≤ this is a flagged binder

    netmhcpan:
      backend: local              # fallback MHC-I tool (binding only)
      local:
        command: netMHCpan
        extra_args: ""
        timeout: 600
      api:
        url: ""
        api_key_env: ECR_NETMHCPAN_API_KEY
        poll_interval: 10
        timeout: 600
      alleles: [HLA-A02:01, HLA-A01:01, HLA-A03:01, HLA-B07:02, HLA-B08:01]
      peptide_lengths: [8, 9, 10, 11]
      rank_threshold: 2.0

    # ── Gate 2: aggregation / solubility ─────────────────────────────────────
    # Enable ONE. 'aggrescan3d' local backend is a BUILT-IN AGGRESCAN-style scorer
    # (no external binary): the published a3v scale, length-adaptive window, and —
    # when the AF3 survivor structure is available — per-residue solvent exposure
    # via freesasa (in the conda env). Sequence-only fallback if no structure.
    aggrescan3d:
      backend: local             # local (built-in) | api | disabled
      api:                       # optional remote per-residue service
        url: ""
        api_key_env: ECR_A3D_API_KEY
      hotspot_cutoff: 0.0        # per-residue score above this = hotspot (a3v HST ~ -0.02)

    # CamSol is web-only (no CLI) — usable here only via the 'api' backend.
    camsol:
      backend: disabled
      api:
        url: ""
        api_key_env: ECR_CAMSOL_API_KEY
      hotspot_cutoff: -1.0       # CamSol: lower = less soluble

    # ── Gate 3: intracellular stability (optional ubiquitination predictor) ──
    # N-end-rule and degron scans always run (no tool needed). UbPred is optional.
    ubpred:
      backend: disabled
      local:
        command: ubpred
        extra_args: ""
        timeout: 300
      score_threshold: 0.6
