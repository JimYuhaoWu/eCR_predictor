# ECR_predictor configuration
# Pass to refine.py with: --config config.yaml

af3:
  # Which backend to use: local | hpcc | online
  backend: hpcc

  # ── Local backend ──────────────────────────────────────────────────────────
  # Use this when running refine.py directly on the HPCC (or any machine
  # where AF3 is installed). Set backend: local in config.yaml, then run
  # refine.py interactively on the HPCC.
  local:
    af3_script: run_alphafold3.sh   # name or full path to run_alphafold3.sh
    module_load: alphafold/3_a40-tmp  # module to load before running (leave blank if not needed)

  # ── HPCC backend (Slurm via SSH) ───────────────────────────────────────────
  # Two authentication types:
  #
  # 1. STATIC PASSWORD (auth_method: password)
  #    Set ssh_password here, or use ECR_HPCC_PASSWORD env var.
  #    Example: export ECR_HPCC_PASSWORD='yourpassword'
  #
  # 2. TOTP (auth_method: totp)
  #    For TOTP-protected accounts, provide the shared secret.
  #    The script generates TOTP codes on-the-fly.
  #    Set totp_secret here, or use ECR_HPCC_TOTP_SECRET env var.
  #    Example: export ECR_HPCC_TOTP_SECRET='JBSWY3DPEBLW64TMMQ======'
  #
  # Avoid committing real credentials to config.yaml (it's gitignored).
  hpcc:
    host: hpcc.example.edu          # HPCC head node hostname or IP
    port: 22                        # SSH port (use 10004 if needed)
    user: your_username             # SSH username

    # Choose one: password | totp
    auth_method: password

    # For password-based auth (static password)
    ssh_password: ""                # or set ECR_HPCC_PASSWORD env var

    # For TOTP-based auth (time-based one-time passwords)
    totp_secret: ""                 # or set ECR_HPCC_TOTP_SECRET env var

    remote_workdir: /scratch/your_username/ecr_af3_jobs  # writable dir on HPCC

    # Slurm settings (match your cluster's available partitions/QOS)
    slurm_partition: a40-tmp
    slurm_qos: gpu
    slurm_nodes: 1
    slurm_cpus: 8
    slurm_gpus: 1
    slurm_mem: 80G
    slurm_module: alphafold/3_a40-tmp  # module load <this>

    # How long to wait between squeue polls (seconds)
    poll_interval: 60
    # Give up after this many seconds (0 = wait forever)
    timeout: 7200

  # ── Online backend (Chai-1 API) ───────────────────────────────────────────
  # Chai-1 is an AF3-class model that supports protein–DNA complexes.
  # Sign up at https://chaidiscovery.com to get an API key, then set:
  #   export ECR_CHAI_API_KEY='your_key'
  # Or paste the key below (do not commit config.yaml with a real key).
  online:
    api_key: ""   # Chai-1 API key (prefer env var ECR_CHAI_API_KEY)
